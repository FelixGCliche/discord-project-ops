services:
  opencode:
    build:
      context: ../..
      dockerfile: apps/opencode/Dockerfile
    ports:
      - '4096:4096'
    environment:
      OPENCODE_API_KEY: '${OPENCODE_API_KEY:?set this in apps/opencode/.env}'
      OPENCODE_SERVER_PASSWORD: '${OPENCODE_SERVER_PASSWORD:?set this in apps/opencode/.env}'
    env_file:
      - .env
    restart: unless-stopped
