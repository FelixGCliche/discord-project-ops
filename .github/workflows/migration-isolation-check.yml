name: Migration Check

on:
  pull_request:
    branches: [main]

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: ./.github/actions/setup

      - name: Check migration isolation
        run: bun run packages/cloudflare/src/check-migration-isolation/index.ts
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
